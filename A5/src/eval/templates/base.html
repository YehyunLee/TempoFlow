<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}TempoFlow Eval{% endblock %}</title>
<style>
  :root {
    --bg: #f5f6f8; --surface: #fff; --border: #dfe3e8;
    --text: #1e293b; --text2: #64748b; --accent: #3b82f6;
    --accent-hover: #2563eb; --green: #22c55e; --amber: #f59e0b;
    --red: #ef4444; --gray: #94a3b8;
    --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
  }
  .topbar {
    background: #0f172a; color: #f8fafc; padding: 12px 24px;
    display: flex; align-items: center; gap: 24px;
  }
  .topbar a { color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 500; }
  .topbar a:hover, .topbar a.active { color: #f8fafc; }
  .topbar .brand { font-weight: 700; font-size: 16px; color: #f8fafc; margin-right: auto; }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border);
       font-weight: 600; font-size: 12px; text-transform: uppercase; color: var(--text2); }
  td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-outline {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-outline:hover { background: var(--accent); color: #fff; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 12px; font-weight: 600; color: #fff;
  }
  .badge-green  { background: var(--green); }
  .badge-amber  { background: var(--amber); }
  .badge-red    { background: var(--red); }
  .badge-gray   { background: var(--gray); }
  .pill-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .pill {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
    text-decoration: none; border: 1px solid var(--border); color: var(--text);
    background: var(--surface);
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pill.unrated { border-color: var(--amber); color: var(--amber); }
  .pill.active.unrated { background: var(--amber); color: #fff; }
  .tag {
    display: inline-block; padding: 2px 8px; margin: 2px;
    background: #e2e8f0; border-radius: 4px; font-size: 12px; color: var(--text);
  }
  input[type="number"] {
    width: 56px; padding: 4px 6px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 14px; text-align: center;
  }
  input[type="number"]:focus { outline: none; border-color: var(--accent); }
  textarea {
    width: 100%; padding: 6px 8px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 13px; resize: vertical; min-height: 48px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text2); }
  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
    border-radius: var(--radius); color: #fff; font-size: 14px; font-weight: 500;
    z-index: 999; transform: translateY(80px); opacity: 0;
    transition: all .3s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-ok { background: var(--green); }
  .toast-err { background: var(--red); }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<nav class="topbar">
  <span class="brand">TempoFlow Eval</span>
  <a href="/review" class="{% if request.url.path.startswith('/review') %}active{% endif %}">Review</a>
  <a href="/dashboard" class="{% if request.url.path.startswith('/dashboard') %}active{% endif %}">Dashboard</a>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
<div id="toast" class="toast"></div>
<script>
function showToast(msg, ok){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(ok?'toast-ok':'toast-err')+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
