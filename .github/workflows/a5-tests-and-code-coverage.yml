name: A5 + Web App Tests and Coverage

on:
  push:
    branches: [ "main", "a5" ]
    paths:
      - 'A5/**'
      - 'web-app/**'
      - 'scripts/**'
      - '.github/workflows/a5-tests-and-code-coverage.yml'
  pull_request:
    branches: [ "main", "a5" ]
    paths:
      - 'A5/**'
      - 'web-app/**'
      - 'scripts/**'
      - '.github/workflows/a5-tests-and-code-coverage.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: |
            A5/requirements.txt

      - name: Install A5 dependencies
        working-directory: ./A5
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run A5 tests + coverage
        shell: bash
        working-directory: ./A5
        run: |
          # set -o pipefail ensures that if pytest fails, the step fails (Red)
          set -o pipefail
          pytest --cov=src | tee pytest-coverage.txt

      - name: Comment A5 coverage on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: ./A5/pytest-coverage.txt
          title: A5 Code Coverage Report
          badge-title: Coverage

      - name: Generate A5 coverage markdown
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/a5')
        working-directory: ./A5
        run: |
          echo "# A5 Test Coverage Report" > test_coverage.md
          echo "" >> test_coverage.md
          echo "*Last Updated: $(date)*" >> test_coverage.md
          echo "" >> test_coverage.md
          echo '```text' >> test_coverage.md
          cat pytest-coverage.txt >> test_coverage.md
          echo '```' >> test_coverage.md

      - name: Commit A5 coverage markdown
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/a5')
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(A5): update test coverage report [skip ci]"
          file_pattern: 'A5/test_coverage.md'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install web-app dependencies
        working-directory: ./web-app
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Run web-app tests + coverage
        shell: bash
        working-directory: ./web-app
        run: |
          set -o pipefail
          npm run coverage | tee vitest-coverage.txt

      - name: Generate web-app coverage markdown
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/a5')
        working-directory: ./web-app
        run: |
          echo "# Web App Test Coverage Report" > test_coverage.md
          echo "" >> test_coverage.md
          echo "*Last Updated: $(date)*" >> test_coverage.md
          echo "" >> test_coverage.md
          echo '```text' >> test_coverage.md
          cat vitest-coverage.txt >> test_coverage.md
          echo '```' >> test_coverage.md

      - name: Commit web-app coverage markdown
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/a5')
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(web-app): update test coverage report [skip ci]"
          file_pattern: 'web-app/test_coverage.md'

      - name: Comment web-app coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const p = path.join(process.env.GITHUB_WORKSPACE, 'web-app', 'vitest-coverage.txt');
            let body = '## Web App Coverage Report\n\n';
            try {
              const txt = fs.readFileSync(p, 'utf8');
              body += '```text\n' + txt.slice(-65000) + '\n```';
            } catch (e) {
              body += '_No coverage output found._';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
