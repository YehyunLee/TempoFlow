name: A5 Tests and Code Coverage

on:
  push:
    branches: [ "main" ]
    paths:
      - 'A5/**'
  pull_request:
    branches: [ "main", "a5" ]
    paths:
      - 'A5/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./A5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Tests
        shell: bash
        run: |
          # set -o pipefail ensures that if pytest fails, the step fails (Red)
          set -o pipefail
          pytest --cov=src | tee pytest-coverage.txt

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: ./A5/pytest-coverage.txt
          title: A5 Code Coverage Report
          badge-title: Coverage

      - name: Generate Coverage Markdown
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "# A5 Test Coverage Report" > test_coverage.md
          echo "" >> test_coverage.md
          echo "*Last Updated: $(date)*" >> test_coverage.md
          echo "" >> test_coverage.md
          echo '```text' >> test_coverage.md
          cat pytest-coverage.txt >> test_coverage.md
          echo '```' >> test_coverage.md

      - name: Commit Coverage Markdown
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(A5): update test coverage report [skip ci]"
          file_pattern: 'A5/test_coverage.md'
